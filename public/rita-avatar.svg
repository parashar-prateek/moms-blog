<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circular background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E8732A;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4956B"/>
      <stop offset="100%" style="stop-color:#C4855B"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2D5016" stroke-width="1.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#E8732A" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#FFF8F0"/>
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>
  
  <g clip-path="url(#circleClip)">
    <!-- Body / Orange top -->
    <ellipse cx="100" cy="215" rx="65" ry="75" fill="#E8732A" opacity="0.9"/>
    <ellipse cx="100" cy="215" rx="55" ry="70" fill="#F08030" opacity="0.3"/>
    
    <!-- Neck -->
    <rect x="85" y="130" width="30" height="25" rx="8" fill="url(#skinGrad)"/>
    
    <!-- Necklace hint -->
    <path d="M 82 148 Q 100 158 118 148" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.7"/>
    <circle cx="100" cy="155" r="2" fill="#DAA520" opacity="0.6"/>
    
    <!-- Face -->
    <ellipse cx="100" cy="105" rx="38" ry="44" fill="url(#skinGrad)"/>
    
    <!-- Hair - dark flowing -->
    <path d="M 58 95 Q 55 60 72 50 Q 85 42 100 40 Q 115 42 128 50 Q 145 60 142 95 L 145 130 Q 148 155 140 170 L 135 150 Q 138 120 135 100 Q 132 70 100 58 Q 68 70 65 100 Q 62 120 65 150 L 60 170 Q 52 155 55 130 Z" fill="#1A1A1A"/>
    
    <!-- Hair strands -->
    <path d="M 62 100 Q 58 130 60 160" fill="none" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
    <path d="M 138 100 Q 142 130 140 160" fill="none" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
    <path d="M 65 110 Q 60 135 63 165" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.3"/>
    <path d="M 135 110 Q 140 135 137 165" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Red hair accessory -->
    <circle cx="120" cy="52" r="4" fill="#C62828" opacity="0.8"/>
    
    <!-- Eyebrows -->
    <path d="M 80 90 Q 87 86 94 89" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 106 89 Q 113 86 120 90" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>
    
    <!-- Eyes -->
    <ellipse cx="88" cy="98" rx="6" ry="4.5" fill="#FFFFF0"/>
    <ellipse cx="112" cy="98" rx="6" ry="4.5" fill="#FFFFF0"/>
    <circle cx="88" cy="98" r="3" fill="#2C1810"/>
    <circle cx="112" cy="98" r="3" fill="#2C1810"/>
    <circle cx="89" cy="97" r="1" fill="#FFF" opacity="0.7"/>
    <circle cx="113" cy="97" r="1" fill="#FFF" opacity="0.7"/>
    
    <!-- Nose -->
    <path d="M 98 100 Q 96 110 94 115 Q 97 118 100 118 Q 103 118 106 115 Q 104 110 102 100" fill="none" stroke="#B8845A" stroke-width="1.2" opacity="0.6"/>
    
    <!-- Gentle smile -->
    <path d="M 88 122 Q 94 129 100 130 Q 106 129 112 122" fill="none" stroke="#9E5A3C" stroke-width="1.8" stroke-linecap="round"/>
    
    <!-- Bindi -->
    <circle cx="100" cy="82" r="2.5" fill="#C62828"/>
  </g>
  
  <!-- Decorative leaf elements around the circle -->
  <g opacity="0.3">
    <!-- Top leaves -->
    <path d="M 90 8 Q 95 0 100 8 Q 95 5 90 8" fill="#2D5016"/>
    <path d="M 100 5 Q 105 -2 110 5 Q 105 2 100 5" fill="#3D6B1E"/>
    <!-- Bottom leaf -->
    <path d="M 95 192 Q 100 200 105 192 Q 100 196 95 192" fill="#2D5016"/>
  </g>
</svg>
